<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votre Panier - The Joy's Pizza</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/panier.css">
</head>
<body>
    <!-- Header -->
    <div id="header"></div>

    <!-- Loading Page -->
    <div class="loading-page" id="loadingPage">
        <div class="loader"></div>
        <p>Chargement de votre panier...</p>
    </div>

    <!-- Section Panier -->
    <main class="cart-main" id="cart-section" style="display: none;">
        <h1>Votre Panier</h1>
        
        <div class="cart-container">
            <!-- Liste des articles -->
            <div class="cart-items" id="cart-items">
                <!-- Rempli dynamiquement par JavaScript -->
                <div class="empty-cart">
                    <p>Votre panier est vide</p>
                    <a href="catalogue.html" class="continue-shopping">← Découvrir nos produits</a>
                </div>
            </div>
            
            <!-- Résumé de la commande -->
            <div class="cart-summary" id="cart-summary" style="display: none;">
                <h3>Récapitulatif</h3>
                <div class="summary-line">
                    <span>Sous-total</span>
                    <span id="subtotal">0 FC</span>
                </div>
                <div class="summary-line">
                    <span>Livraison</span>
                    <span>2 500 FC</span>
                </div>
                <div class="summary-line total">
                    <span>Total</span>
                    <span id="total">2 500 FC</span>
                </div>
                <button class="checkout-btn" onclick="commander()">Passer la commande</button>
                <a href="catalogue.html" class="continue-shopping">← Continuer mes achats</a>
            </div>
        </div>
    </main>
   <hr>
   <div style="display: flex; justify-content: center; margin: 20px 0 40px;">
    <div style="background-color: white; padding: 25px; border-radius: 10px; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <div style="margin: 15px 0; color: #641616;">
            <span style="font-weight: bold; color: #770808;">Lundi - Samedi :</span> 12h30 - 19h30
        </div>
        <div style="margin: 15px 0; color: #641616;">
            <span style="font-weight: bold; color: #770808;">Dimanche :</span> 12h30 - 17h30
        </div>
        <p style="color: #770808; margin-top: 15px; font-style: italic; font-weight: bold;">
            ⏰ Commandez en ligne 24h/24
        </p>
    <a href="avis.html" class="continue-shopping">Avis et Commentaire →</a>

    </div>
</div>
    <!-- Footer -->
    <div id="footer"></div>

    <!-- Scripts -->
    <script src="js/composent.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
