<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/loading.css">
    <title>The joys pizza</title>
   
</head>
<body>
    <!-- PAGE DE CHARGEMENT -->
    <div class="loading-page" id="loadingPage">
        <div class="loading-card">
            <!-- Logo -->
            <div class="logo-wrapper">
                <img src="../img/logo.jpg" 
                     alt="Logo Restaurant" 
                     class="loading-logo"
                     onerror="this.src='https://via.placeholder.com/100/770808/ffffff?text=Resto'">
            </div>
            
            <!-- Titre -->
            <h1 class="loading-title">the joy's pizza</h1>
            <div class="loading-subtitle"> The joy's pizza, la où chaque bouchée <br>redonne le sourir<br></div>
            
            <!-- Spinner -->
            <div class="spinner-container">
                <div class="spinner-simple"></div>
            </div>
            
            <!-- Barre de progression -->
            <div class="progress-wrapper">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
            
            <!-- Pourcentage -->
            <div class="percentage" id="percentage">0%</div>
            
            <!-- Message dynamique -->
            <div class="message" id="message">Préparation de votre commande</div>
            
            <!-- Petit message pro -->
            <div class="fun-tip" id="funTip">
                <span>🍽️</span> Les meilleurs plats prennent un peu de temps <span>⏱️</span>
            </div>
        </div>
    </div>

    <script src="../js/loading.js">
        
       
    </script>
</body>
</html>
